<!DOCTYPE html>
<html lang="zh-CN">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>专业图像编辑工具 | 增强水印系统</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            background: #f0f2f5;
            color: #1e1f22;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: auto;
            min-height: 56px;
            background: #ffffffcc;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            background-color: rgba(255,255,255,0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 12px;
            gap: clamp(6px, 2vw, 16px);
            z-index: 1000;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
            overflow-x: auto;
            overflow-y: visible;
            white-space: nowrap;
            scrollbar-width: thin;
            flex-wrap: nowrap;
        }
        
        .top-bar::-webkit-scrollbar {
            height: 3px;
        }
        
        .top-bar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 3px;
        }
        
        .top-bar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: auto;
            min-height: 64px;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(16px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(6px, 2vw, 14px);
            padding: 8px 12px;
            z-index: 1000;
            border-top: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 -2px 8px rgba(0,0,0,0.02);
            overflow-x: auto;
            overflow-y: visible;
            white-space: nowrap;
            flex-wrap: nowrap;
            scrollbar-width: thin;
        }
        
        .bottom-bar::-webkit-scrollbar {
            height: 3px;
        }
        
        .bottom-bar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 3px;
        }
        
        .bottom-bar::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.3);
            border-radius: 3px;
        }
        
        .bottom-bar > * {
            flex-shrink: 0;
        }
        
        .top-bar > * {
            flex-shrink: 0;
        }

        button, .file-label {
            background: #f3f5f8;
            border: none;
            font-size: clamp(12px, 3.5vw, 14px);
            font-weight: 500;
            padding: clamp(6px, 1.8vw, 10px) clamp(12px, 3vw, 20px);
            border-radius: 40px;
            color: #1e1f22;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            white-space: nowrap;
            letter-spacing: 0.3px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
            min-width: fit-content;
        }

        button:active, .file-label:active {
            transform: scale(0.96);
            transition-duration: 0.08s;
        }
        
        button:hover, .file-label:hover {
            filter: brightness(0.97);
        }

        .btn-primary {
            background: #0078d4;
            color: white;
            box-shadow: 0 1px 3px rgba(0,120,212,0.25);
        }

        .btn-primary:active {
            background: #005a9e;
        }

        .tool-active {
            background: #0078d4 !important;
            color: white !important;
            box-shadow: 0 2px 8px rgba(0,120,212,0.35);
        }

        .btn-warning {
            background: #fff1f0;
            color: #d13438;
        }
        
        .btn-warning:active {
            background: #ffe6e5;
        }

        .viewer-area {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1e1f22;
            overflow: hidden;
            touch-action: none;
            cursor: default;
            transition: top 0.1s ease, bottom 0.1s ease;
        }
        
        @media (max-width: 768px) {
            .top-bar {
                min-height: 52px;
                padding: 6px 10px;
            }
            .bottom-bar {
                min-height: 58px;
                padding: 6px 10px;
            }
            button, .file-label {
                padding: clamp(5px, 1.5vw, 8px) clamp(10px, 2.5vw, 16px);
                font-size: clamp(11px, 3vw, 13px);
            }
        }
        
        @media (max-width: 560px) {
            .top-bar {
                min-height: 48px;
                padding: 5px 8px;
                gap: clamp(4px, 1.5vw, 10px);
            }
            .bottom-bar {
                min-height: 54px;
                padding: 5px 8px;
                gap: clamp(4px, 1.5vw, 10px);
            }
            button, .file-label {
                padding: clamp(4px, 1.2vw, 7px) clamp(8px, 2.2vw, 14px);
                font-size: clamp(10px, 2.8vw, 12px);
                border-radius: 32px;
            }
        }
        
        @media (max-width: 420px) {
            .top-bar {
                min-height: 44px;
                padding: 4px 6px;
                gap: 5px;
            }
            .bottom-bar {
                min-height: 50px;
                padding: 4px 6px;
                gap: 5px;
            }
            button, .file-label {
                padding: 5px 10px;
                font-size: 11px;
                border-radius: 28px;
            }
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            background: #0078d4;
            color: white;
            cursor: pointer;
        }
        
        .top-bar, .bottom-bar {
            scroll-behavior: smooth;
        }
        
        .progress-toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            color: white;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: clamp(12px, 3.5vw, 14px);
            font-weight: 500;
            z-index: 1100;
            pointer-events: none;
            transition: opacity 0.2s;
            font-family: monospace;
            letter-spacing: 0.5px;
            white-space: nowrap;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
            opacity: 0;
        }
        
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            display: block;
            pointer-events: none;
        }

        #canvas {
            pointer-events: auto;
        }

        #overlay {
            pointer-events: none;
        }
        
        @media (max-width: 360px) {
            button, .file-label {
                padding: 4px 8px;
                font-size: 10px;
                gap: 2px;
            }
            .top-bar, .bottom-bar {
                gap: 4px;
            }
        }
        
      /* ==================== 水印面板（独立样式，不影响拼图）==================== */
.wm-panel {
    position: fixed;
    bottom: 64px;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(10px);
    border-top: 1px solid #e0e0e0;
    border-radius: 12px 12px 0 0;
    padding: 8px 12px;
    z-index: 1001;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    display: none;
    flex-direction: column;
}

.wm-panel-inner {
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
}

/* 行布局 - 使用独立类名 */
.wm-row {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(8px, 2vw, 16px);
    margin-bottom: clamp(8px, 1.5vh, 12px);
    align-items: center;
    justify-content: space-between;
}

.wm-row-left-60 {
    flex: 6;
    min-width: 0;
}

.wm-row-right-40 {
    flex: 4;
    min-width: 0;
}

.wm-row-left-70 {
    flex: 7;
    min-width: 0;
}
.wm-row-right-30 {
    flex: 3;
    min-width: 0;
}

/* 文字框 - 和拼图方式按钮高度一致 */
.wm-input-box {
    background: #f0f0f0;
    border: none;
    padding: clamp(4px, 1.2vw, 7px) clamp(8px, 1.5vw, 12px);
    border-radius: 0;
    font-size: clamp(7px, 2.2vw, 9px);
    font-weight: 500;
    font-family: inherit;
    width: 100%;
    box-sizing: border-box;
}

/* 字体横向滚动（隐藏滚动条） */
.wm-font-scroll {
    background: #f0f0f0;
    border-radius: 0;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    width: 100%;
    display: flex;
    gap: 6px;
    padding: clamp(4px, 1.2vw, 7px) clamp(6px, 1.2vw, 10px);
}

.wm-font-scroll::-webkit-scrollbar {
    display: none;
}

.wm-font-option {
    background: transparent;
    border: none;
    padding: 0;
    font-size: clamp(7px, 2.2vw, 9px);
    font-weight: 500;
    white-space: nowrap;
    cursor: pointer;
    font-family: inherit;
}

.wm-font-option.selected {
    color: #0078d4;
    font-weight: bold;
}

/* 颜色滚动条 - 完全复制拼图背景色滚动条样式 */
.wm-colors-scroll {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    gap: clamp(4px, 1.5vw, 8px);
    padding: clamp(3px, 0.8vh, 5px) 0;
    width: 100%;
}

.wm-colors-scroll::-webkit-scrollbar {
    display: none;
}

.wm-color-block {
    width: clamp(20px, 5vw, 28px);
    height: clamp(20px, 5vw, 28px);
    border-radius: 4px;
    cursor: pointer;
    flex-shrink: 0;
    border: 1px solid #ddd;
    transition: transform 0.1s ease;
}

.wm-color-block.active {
    border: 2px solid #0078d4;
    transform: scale(1.05);
}

/* 滑块行 - 完全复制拼图间距滑块样式 */
.wm-slider-row {
    display: flex;
    align-items: baseline;
    gap: 0;
    width: 100%;
}

.wm-slider-row .slider-label {
    flex-shrink: 0;
    font-size: clamp(6px, 2vw, 7.2px);
    font-weight: 500;
    color: #333;
    white-space: nowrap;
    margin-right: clamp(1px, 0.8vw, 2px);
}

.wm-slider-row .slider-value {
    width: 12px;
    display: inline-block;
    text-align: center;
    font-size: clamp(6px, 2vw, 7.2px);
    flex-shrink: 0;
}

.wm-slider-row .slider-unit {
    font-size: clamp(6px, 2vw, 7.2px);
    flex-shrink: 0;
    margin-left: 2px;
    margin-right: 3px;
}

.wm-slider-row input[type="range"] {
    flex: 1;
    min-width: 0;
    height: 3px;
    margin: 4;
}

/* 旋转按钮组 - 完全复制拼图方式按钮样式 */
.wm-rotate-group {
    display: flex;
    flex-wrap: nowrap;           /* 禁止换行 */
    gap: clamp(3px, 1vw, 8px);
    width: 100%;
}

.wm-rotate-btn {
    background: #f0f0f0;
    border: none;
    padding: clamp(4px, 1.2vw, 7px) clamp(5px, 1.2vw, 8px);
    border-radius: clamp(14px, 4vw, 24px);
    font-size: clamp(7px, 2.2vw, 9px);
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 1;      /* ✅ 关键：允许按钮缩小 */
    transition: all 0.2s ease;
}

.wm-rotate-btn.active {
    background: #0078d4;
    color: white;
}

/* 三个操作按钮组 - 完全复制拼图选图/制作按钮样式 */
.wm-buttons-group {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    gap: clamp(4px, 1.5vw, 10px);
    width: 100%;
}

.wm-action-btn {
    flex: 1 1 auto;
    min-width: 0;
    padding: clamp(4px, 1.2vw, 7px) clamp(6px, 1.5vw, 10px);
    border: none;
    border-radius: clamp(14px, 4vw, 24px);
    font-size: clamp(7px, 2.2vw, 9px);
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    white-space: nowrap;
    transition: all 0.2s ease;
}

.wm-action-btn.add-btn {
    background: #28a745;
    color: white;
}

.wm-action-btn.del-btn {
    background: #dc3545;
    color: white;
}

.wm-action-btn.apply-btn {
    background: #0078d4;
    color: white;
}

.wm-action-btn:active {
    transform: scale(0.96);
}


/* 隐藏旧的select（保留用于兼容） */
#wmFont {
    display: none;
}
/* ==================== 拼图面板 - 工业级响应式 ==================== */
.collage-panel {
    position: fixed;
    bottom: 64px;
    left: 0;
    right: 0;
    background: rgba(255,255,255,0.98);
    backdrop-filter: blur(10px);
    border-top: 1px solid #e0e0e0;
    border-radius: 12px 12px 0 0;
    padding: 8px 12px;
    z-index: 1001;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
}

.collage-panel-inner {
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
}

/* 缩略图列表 - 横向滚动 */
.collage-image-list {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: clamp(6px, 2vw, 12px);
    padding: clamp(5px, 1.5vw, 10px);
    min-height: clamp(50px, 10vw, 70px);
    background: #f5f5f5;
    border-radius: 10px;
}

.collage-image-list::-webkit-scrollbar {
    height: 3px;
}

.collage-image-list::-webkit-scrollbar-track {
    background: #e0e0e0;
    border-radius: 3px;
}

.collage-image-list::-webkit-scrollbar-thumb {
    background: #aaa;
    border-radius: 3px;
}

.collage-image-item {
    width: clamp(45px, 10vw, 65px);
    height: clamp(45px, 10vw, 65px);
    object-fit: cover;
    border-radius: 8px;
    cursor: pointer;
    border: 2px solid transparent;
    flex-shrink: 0;
    transition: all 0.2s ease;
}

.collage-image-item.selected {
    border-color: #0078d4;
    box-shadow: 0 0 0 2px rgba(0,120,212,0.3);
    transform: scale(1.02);
}
/* 两列布局 - 两端对齐 */
.collage-row {
    display: flex;
    flex-wrap: wrap;
    gap: clamp(8px, 2vw, 16px);
    margin-bottom: clamp(8px, 1.5vh, 12px);
    align-items: center;
    justify-content: space-between;
}
.collage-row-left-60 {
    flex: 6;           /* 占 60% 宽度 */
    min-width: 0;
}

.collage-row-right-40 {
    flex: 4;           /* 占 40% 宽度 */
    min-width: 0;      /* 移除 flex-shrink: 0，允许按比例缩放 */
}

.collage-row-left-70 {
    flex: 7;           
    min-width: 0;
}

.collage-row-right-30 {
    flex: 3;           
    min-width: 0;
}

/* 间距标签 - 响应式缩小 */
.spacing-label {
    font-size: clamp(6px, 2vw, 7.2px);
    font-weight: 500;
    color: #333;
    white-space: nowrap;
}
.spacing-row span:last-of-type {
    margin-right: 3px;
}
/* 背景色滚动条 */
.collage-colors-scroll {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    scrollbar-width: none;
    -ms-overflow-style: none;
    gap: clamp(4px, 1.5vw, 8px);
    padding: clamp(3px, 0.8vh, 5px) 0;
    width: 100%;
}

.collage-colors-scroll::-webkit-scrollbar {
    display: none;

.collage-color-block {
    width: clamp(20px, 5vw, 28px);

    border-radius: 4px;

    border: 1px solid #ddd;
    transition: transform 0.1s ease;
}

.collage-color-block.active {
    border: 2px solid #0078d4;

/* 间距行 - 滑动条填满剩余空间 */
.spacing-row {
    display: flex;
    align-items: baseline;
    gap: 0;
    width: 100%;
}

.spacing-row #spacingVal {
    min-width: 12px;           /* 固定宽度，1-50都够用 */

}

.spacing-row .spacing-label {
    flex-shrink: 0;
    font-size: clamp(6px, 2vw, 7.2px);
margin-right: clamp(1px, 0.8vw, 4px);   /* 标签右侧小间距 */
}

.spacing-row #spacingSlider {

/* 拼图方式按钮组 - 强制一行显示，不滚动 */
.collage-layout-group {
    display: flex;
    flex-wrap: nowrap;           /* 强制不换行 */
    overflow-x: visible;         /* 不允许滚动，溢出可见（但会被父容器裁剪） */
    overflow-y: visible;
    justify-content: flex-start;
    gap: clamp(3px, 1vw, 8px);
    width: 100%;
}

/* 关键：让父容器允许溢出，或者使用 flex 收缩 */
.collage-row-left-70 {
    flex: 7;
    min-width: 0;
    overflow-x: auto;            /* 如果内容过多，让父容器滚动而不是按钮组滚动 */
}
.collage-layout-btn {
    background: #f0f0f0;
    border: none;
    padding: clamp(4px, 1.2vw, 7px) clamp(5px, 1.2vw, 8px);  /* 减小左右内边距 */
    border-radius: clamp(14px, 4vw, 24px);
    font-size: clamp(7px, 2.2vw, 9px);  /* 稍微减小字体 */
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 1;                 /* 允许按钮被压缩 */

    transition: all 0.2s ease;
}

.collage-layout-btn.active {
    background: #0078d4;
    color: white;
}

.collage-layout-btn:active {

}

/* 右侧按钮组 - 分散对齐 */

    display: flex;
    flex-direction: row;
    justify-content: space-between;
    gap: clamp(4px, 1.5vw, 10px);
    width: 100%;
}

/* 按钮与拼图方式按钮等宽（允许压缩） */

    flex: 1 1 auto;              /* 允许拉伸和压缩 */
    min-width: 0;                /* 允许压缩到最小 */
    padding: clamp(4px, 1.2vw, 7px) clamp(6px, 1.5vw, 10px);
    border: none;
    border-radius: clamp(14px, 4vw, 24px);
    font-size: clamp(7px, 2.2vw, 9px);
    font-weight: 500;
    cursor: pointer;
    text-align: center;
    white-space: nowrap;
    transition: all 0.2s ease;
}
.collage-action-btn.add-btn {
    background: #28a745;
    color: white;
}

.collage-action-btn.add-btn:active {
    transform: scale(0.96);
    background: #218838;
}

.collage-action-btn.apply-btn {
    background: #0078d4;
    color: white;
}

.collage-action-btn.apply-btn:active {
    transform: scale(0.96);
    background: #005a9e;
}


/* ==================== 响应式断点系统 ==================== */
/* 大手机/小平板 (481px - 768px) */
@media (min-width: 481px) and (max-width: 768px) {
    .collage-image-item {
        width: clamp(50px, 8vw, 60px);
        height: clamp(50px, 8vw, 60px);
    }
    
    .collage-layout-btn {
        padding: 5px 12px;
        font-size: 10px;
    }
    
    .collage-action-btn {
        padding: 5px 8px;
        font-size: 10px;
    }
    
}

/* 小手机 (361px - 480px) */
@media (min-width: 361px) and (max-width: 480px) {
    .collage-panel {
        padding: 6px 10px;
    }
    
    .collage-image-item {
        width: clamp(42px, 9vw, 50px);
        height: clamp(42px, 9vw, 50px);
    }
    
    .collage-layout-btn {
        padding: 4px 10px;
        font-size: 9px;
    }
    
    .collage-action-btn {
        padding: 4px 6px;
        font-size: 9px;
    }
    
    .collage-color-block {
        width: clamp(18px, 4.5vw, 22px);
        height: clamp(18px, 4.5vw, 22px);
    }

<script>
    (function(){
        // ----- DOM 元素 ------
const watermarkPanel = document.getElementById("watermarkPanel");
const collagePanel = document.getElementById("collagePanel");

        const viewerDiv = document.getElementById("viewer");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");
        const overlay = document.getElementById("overlay");
        const octx = overlay.getContext("2d");
        const progressDiv = document.getElementById("progressToast");
        const fileInput = document.getElementById("multiFile");
        
const watermarkBtn = document.getElementById("watermarkBtn");
const collageBtn = document.getElementById("collageBtn");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");

        const zoomInBtn = document.getElementById("zoomInBtn");
        const zoomOutBtn = document.getElementById("zoomOutBtn");
        const saveAllBtn = document.getElementById("saveAllBtn");
        const moveZoomBtn = document.getElementById("moveZoomBtn");
        const blurToolBtn = document.getElementById("blurToolBtn");
        const undoBtn = document.getElementById("undoBtn");
        const redoBtn = document.getElementById("redoBtn");
        const resetBtn = document.getElementById("resetBtn");

        
        let imageFiles = [];
        let states = [];
        let currentIndex = 0;
        
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        
        let currentTool = "moveZoom";

        let isDragging = false;
        let isDrawingBlur = false;
        let dragStartViewX = 0, dragStartViewY = 0;
        let blurStartX = 0, blurStartY = 0;
        let currentImgWidth = 0, currentImgHeight = 0;
        
        // 禁止右键/拖拽等
        document.addEventListener('contextmenu', (e) => { e.preventDefault(); return false; });
        document.addEventListener('dragstart', (e) => { e.preventDefault(); return false; });
        document.addEventListener('selectstart', (e) => { e.preventDefault(); return false; });
        
        function adjustViewerArea(shouldReset = false) {
            const topBar = document.getElementById("topBar");
            const bottomBar = document.getElementById("bottomBar");
            if (topBar && bottomBar) {
                viewerDiv.style.top = topBar.offsetHeight + "px";
                viewerDiv.style.bottom = bottomBar.offsetHeight + "px";
            }
            if (!states[currentIndex] || !states[currentIndex].history.length) return;
            if (shouldReset) resetViewTransform(); else renderCanvas();
        }
        
        window.addEventListener("resize", () => { adjustViewerArea(false); });
        
        function showMsg(msg, duration = 1000) {
            if (!msg) return;
            progressDiv.innerText = msg;
            progressDiv.style.opacity = "1";
            clearTimeout(window._msgTimer);
            window._msgTimer = setTimeout(() => {
                progressDiv.style.opacity = "0";
                setTimeout(() => { if(progressDiv.innerText === msg) progressDiv.innerText = ""; }, 200);
            }, duration);
        }
        
        function cloneImageData(imgData) {
            return new ImageData(new Uint8ClampedArray(imgData.data), imgData.width, imgData.height);
        }
        
        function getCurrentImageData() {
            if(!states[currentIndex] || !states[currentIndex].history.length) return null;
            return states[currentIndex].history[states[currentIndex].history.length - 1];
        }
        
        function pushHistoryState(newImageData) {
            if(!states[currentIndex]) return;
            const s = states[currentIndex];
            s.history.push(cloneImageData(newImageData));
            s.redo = [];
            if(s.history.length > 50) s.history.shift();
            renderCanvas();
        }
        

function getWatermarkSize(ctx, wm) {
    // 使用独立测量canvas，避免任何transform污染
    const measureCanvas = document.createElement("canvas");
    const measureCtx = measureCanvas.getContext("2d");

    measureCtx.font = `bold ${wm.fontSize}px ${wm.fontFamily}`;

const metrics = measureCtx.measureText(wm.text);

const width = metrics.width;

// 使用真实文字高度（工业级）
const ascent = metrics.actualBoundingBoxAscent || wm.fontSize;
const descent = metrics.actualBoundingBoxDescent || 0;
const height = ascent + descent;
    return { width, height };
}

function isPointInWatermark(wm, x, y, ctx) {
    // 1. 获取文字尺寸（image空间）
    const size = getWatermarkSize(ctx, wm);
    const halfW = size.width / 2;
    const halfH = size.height / 2;

    // 2. 转到以水印为中心的坐标系
    const dx = x - wm.x;
    const dy = y - wm.y;

    // 3. 逆旋转（关键）
    const rad = -wm.rotation * Math.PI / 180;
    const cos = Math.cos(rad);
    const sin = Math.sin(rad);

    const localX = dx * cos - dy * sin;
    const localY = dx * sin + dy * cos;

    // 4. 在未旋转矩形内判断
    return (
        localX >= -halfW &&
        localX <= halfW &&
        localY >= -halfH &&
        localY <= halfH
    );
}


        function renderCanvas() {
            if (!states[currentIndex] || !states[currentIndex].history.length) return;
            const imgData = getCurrentImageData();
            if(!imgData) return;
            const rect = viewerDiv.getBoundingClientRect();
            if (rect.width <= 0 || rect.height <= 0) return;
            const viewW = rect.width, viewH = rect.height;
            const dpr = window.devicePixelRatio || 1;
            canvas.width = viewW * dpr; canvas.height = viewH * dpr;
            overlay.width = viewW * dpr; overlay.height = viewH * dpr;
            canvas.style.width = `${viewW}px`; canvas.style.height = `${viewH}px`;
            overlay.style.width = `${viewW}px`; overlay.style.height = `${viewH}px`;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            ctx.clearRect(0, 0, viewW, viewH);
            const tempCanvas = document.createElement("canvas");
            tempCanvas.width = imgData.width; tempCanvas.height = imgData.height;
            tempCanvas.getContext("2d").putImageData(imgData, 0, 0);

     ctx.save();
ctx.translate(offsetX, offsetY);
ctx.scale(scale, scale);


            ctx.drawImage(tempCanvas, 0, 0);
            ctx.restore();
            // 重新渲染水印预览
            if(watermarkPanel.style.display !== "none") renderWatermarkPreview();
        }
        
        function resetViewTransform() {
            const imgData = getCurrentImageData();
            if(!imgData) return;
            const rect = viewerDiv.getBoundingClientRect();
            if (rect.width <= 0 || rect.height <= 0) return;
            const viewW = rect.width, viewH = rect.height;
            const fitScale = Math.min(viewW / imgData.width, viewH / imgData.height);
            scale = Math.max(0.1, fitScale);
            offsetX = (viewW - imgData.width * scale) / 2;
            offsetY = (viewH - imgData.height * scale) / 2;
            renderCanvas();
        }
        
        function getImageCoordFromScreen(clientX, clientY) {
            const rect = viewerDiv.getBoundingClientRect();
            const viewX = clientX - rect.left, viewY = clientY - rect.top;
            return { x: (viewX - offsetX) / scale, y: (viewY - offsetY) / scale };
        }
        
        function applyMosaic(x, y, w, h) {
            if(w <= 0 || h <= 0) return;
            const imgData = getCurrentImageData();
            if(!imgData) return;
            let ix = Math.max(0, Math.floor(x)), iy = Math.max(0, Math.floor(y));
            let iw = Math.min(imgData.width - ix, Math.ceil(w)), ih = Math.min(imgData.height - iy, Math.ceil(h));
            if(iw <= 1 || ih <= 1) return;
            const workingData = cloneImageData(imgData);
            const data = workingData.data;
            const step = 14;
            for(let row = 0; row < ih; row += step) {
                for(let col = 0; col < iw; col += step) {
                    let rSum=0,gSum=0,bSum=0,count=0;
                    const blockW = Math.min(step, iw - col), blockH = Math.min(step, ih - row);
                    for(let dy=0; dy<blockH; dy++) {
                        for(let dx=0; dx<blockW; dx++) {
                            const px = (iy + row + dy) * imgData.width + (ix + col + dx);
                            const idx = px*4;
                            rSum+=data[idx]; gSum+=data[idx+1]; bSum+=data[idx+2]; count++;
                        }
                    }
                    const avgR=rSum/count, avgG=gSum/count, avgB=bSum/count;
                    for(let dy=0; dy<blockH; dy++) {
                        for(let dx=0; dx<blockW; dx++) {
                            const px = (iy + row + dy) * imgData.width + (ix + col + dx);
                            const idx = px*4;
                            data[idx]=avgR; data[idx+1]=avgG; data[idx+2]=avgB;
                        }
                    }
                }
            }
            pushHistoryState(new ImageData(workingData.data, workingData.width, workingData.height));
        }
        
        function drawPreviewRect(startX, startY, endX, endY) {
            octx.clearRect(0, 0, overlay.width, overlay.height);
            const rect = viewerDiv.getBoundingClientRect();
            const dpr = window.devicePixelRatio||1;
            octx.setTransform(dpr,0,0,dpr,0,0);
            const left = Math.min(startX,endX), top = Math.min(startY,endY);
            const w = Math.abs(endX-startX), h = Math.abs(endY-startY);
            if(w<=0.5||h<=0.5) return;
            const viewLeft = left*scale+offsetX, viewTop = top*scale+offsetY;
            octx.strokeStyle="#ff4d4f"; octx.lineWidth=1/dpr; octx.setLineDash([6,6]);
            octx.strokeRect(viewLeft, viewTop, w*scale, h*scale);
        }
        
        function setActiveTool(toolName) {
    currentTool = toolName;

    // ===== 1. 先清空所有按钮状态 =====
    moveZoomBtn.classList.remove("tool-active");
    blurToolBtn.classList.remove("tool-active");
    watermarkBtn.classList.remove("tool-active");
    collageBtn.classList.remove("tool-active");

    // ===== 2. 先隐藏所有面板 =====
    watermarkPanel.style.display = "none";
 collagePanel.style.display = "none";

    // ===== 3. 根据模式开启 =====
    if(toolName === "moveZoom") {
        moveZoomBtn.classList.add("tool-active");
        viewerDiv.style.cursor = "grab";
    }
    else if(toolName === "blur") {
        blurToolBtn.classList.add("tool-active");
        viewerDiv.style.cursor = "crosshair";
    }
    else if(toolName === "watermark") {
        watermarkBtn.classList.add("tool-active");
        viewerDiv.style.cursor = "default";

        // ✅ 关键：重新打开水印面板
        watermarkPanel.style.display = "flex";
        renderWatermarkPreview();
    }
else if(toolName === "collage") {
    collageBtn.classList.add("tool-active");
    viewerDiv.style.cursor = "default";

    // 打开拼图面板
    const collagePanel = document.getElementById("collagePanel");
    if (collagePanel) {
        collagePanel.style.display = "block";
        // 刷新缩略图列表
        if (typeof buildImageList === 'function') {
            buildImageList();
        }
    }
}
}
        


        let isDraggingMove = false, dragStartX=0, dragStartY=0;
        let touchZoomActive=false, touchStartDist=0, touchStartScale=1;
        function onPointerDownMoveZoom(e) { if(currentTool!=="moveZoom") return; e.preventDefault(); isDraggingMove=true; dragStartX=e.clientX-offsetX; dragStartY=e.clientY-offsetY; viewerDiv.style.cursor="grabbing"; }
        function onPointerMoveMoveZoom(e) { if(currentTool!=="moveZoom"||!isDraggingMove) return; offsetX=e.clientX-dragStartX; offsetY=e.clientY-dragStartY; renderCanvas(); }
        function onPointerUpMoveZoom() { isDraggingMove=false; viewerDiv.style.cursor="grab"; }
        function onWheelMoveZoom(e) { if(currentTool!=="moveZoom") return; e.preventDefault(); const rect=viewerDiv.getBoundingClientRect(); const centerX=e.clientX-rect.left, centerY=e.clientY-rect.top; const imgX=(centerX-offsetX)/scale, imgY=(centerY-offsetY)/scale; const delta=e.deltaY>0?0.9:1.1; scale*=delta; offsetX=centerX-imgX*scale; offsetY=centerY-imgY*scale; renderCanvas(); }
        function onTouchStartMoveZoom(e) { if(currentTool!=="moveZoom") return; if(e.touches.length===2){ e.preventDefault(); const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; touchStartDist=Math.hypot(dx,dy); touchStartScale=scale; touchZoomActive=true; isDraggingMove=false; } else if(e.touches.length===1 && !touchZoomActive){ isDraggingMove=true; dragStartX=e.touches[0].clientX-offsetX; dragStartY=e.touches[0].clientY-offsetY; viewerDiv.style.cursor="grabbing"; e.preventDefault(); } }
        function onTouchMoveMoveZoom(e) { if(currentTool!=="moveZoom") return; if(touchZoomActive && e.touches.length===2){ e.preventDefault(); const rect=viewerDiv.getBoundingClientRect(); const centerX=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left; const centerY=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top; const dx=e.touches[0].clientX-e.touches[1].clientX, dy=e.touches[0].clientY-e.touches[1].clientY; const dist=Math.hypot(dx,dy); const newScale=touchStartScale*(dist/touchStartDist); const imgX=(centerX-offsetX)/scale, imgY=(centerY-offsetY)/scale; scale=newScale; offsetX=centerX-imgX*scale; offsetY=centerY-imgY*scale; renderCanvas(); } else if(isDraggingMove && e.touches.length===1){ offsetX=e.touches[0].clientX-dragStartX; offsetY=e.touches[0].clientY-dragStartY; renderCanvas(); e.preventDefault(); } }
        function onTouchEndMoveZoom(e) { if(e.touches.length<2) touchZoomActive=false; if(isDraggingMove && e.touches.length===0){ isDraggingMove=false; viewerDiv.style.cursor="grab"; } }

let isSaving = false;

function saveAllImages() {
    if (isSaving) {
        showMsg("正在保存中，请稍候...", 800);
        return;
    }
    
    if (!states.length) {
        showMsg("没有可保存的图片", 1000);
        return;
    }
    
    const saveList = [];
    for (let i = 0; i < states.length; i++) {
        const s = states[i];
        if (s) {
            const imgData = (s.history && s.history.length)
                ? s.history[s.history.length - 1]
                : s.original;
            
            if (imgData) {
                saveList.push({
                    index: i,
                    imgData: imgData
                });
            }
        }
    }
    
    if (saveList.length === 0) {
        showMsg("没有可保存的图片", 1000);
        return;
    }
    
    isSaving = true;
    const total = saveList.length;
    
    // ========== 情况1：只有1张图片 ==========
    if (total === 1) {
        const item = saveList[0];
        const exportCanvas = document.createElement("canvas");
        exportCanvas.width = item.imgData.width;
        exportCanvas.height = item.imgData.height;
        exportCanvas.getContext("2d").putImageData(item.imgData, 0, 0);
        
        const link = document.createElement("a");
        const fileName = `edited_${item.index + 1}.png`;
        link.download = fileName;
        link.href = exportCanvas.toDataURL("image/png");
        
        progressDiv.innerText = `保存中 1/1`;
        progressDiv.style.opacity = "1";
        link.click();
        
        setTimeout(() => {
            isSaving = false;
            showMsg(`保存完成！共 ${total} 张`, 1500);
            progressDiv.style.opacity = "0";
            setTimeout(() => {
                if (progressDiv.innerText === `保存中 1/1`) progressDiv.innerText = "";
            }, 200);
        }, 500);
        return;
    }
    
    // ========== 情况2：多张图片，打包成 ZIP ==========
    showMsg(`正在打包 ${total} 张图片...`, 1500);
    progressDiv.innerText = `打包中 0/${total}`;
    progressDiv.style.opacity = "1";
    
    const zip = new JSZip();
    let completed = 0;
    
    for (const item of saveList) {
        const exportCanvas = document.createElement("canvas");
        exportCanvas.width = item.imgData.width;
        exportCanvas.height = item.imgData.height;
        exportCanvas.getContext("2d").putImageData(item.imgData, 0, 0);
        
        exportCanvas.toBlob((blob) => {
            const fileName = `edited_${item.index + 1}.png`;
            zip.file(fileName, blob);
            completed++;
            
            progressDiv.innerText = `打包中 ${completed}/${total}`;
            
            if (completed === total) {
                zip.generateAsync({ type: "blob" })
                    .then((zipBlob) => {
                        const link = document.createElement("a");
                        const zipName = `edited_images_${Date.now()}.zip`;
                        link.download = zipName;
                        link.href = URL.createObjectURL(zipBlob);
                        link.click();
                        URL.revokeObjectURL(link.href);
                        
                        isSaving = false;
                        showMsg(`保存完成！共 ${total} 张图片已打包为 ZIP`, 2000);
                        progressDiv.style.opacity = "0";
                        setTimeout(() => {
                            if (progressDiv.innerText.includes("打包")) progressDiv.innerText = "";
                        }, 200);
                    })
                    .catch((err) => {
                        console.error("ZIP 生成失败:", err);
                        showMsg("打包失败，请重试", 1500);
                        isSaving = false;
                        progressDiv.style.opacity = "0";
                    });
            }
        }, "image/png");
    }
}

        // 打开拼图面板
        setActiveTool("collage");
        // 确保缩略图列表刷新
        if (typeof buildImageList === 'function') {
            buildImageList();
        }
    } else {
        // 关闭拼图面板
        panel.style.display = "none";
        // 恢复原图显示
        renderCanvas();
        // 切换回拖动模式（可选，但建议加上）
        //setActiveTool("moveZoom");
    }
};

// 添加点击外部关闭拼图面板
document.addEventListener("click", (e) => {
    if (panel.style.display !== "none" && 
        !panel.contains(e.target) && 
        e.target !== collageBtn) {
        panel.style.display = "none";
        // 恢复原图显示
        renderCanvas();
    }
});

/* ================== 图片列表 ================== */
function buildImageList(){
    imageListEl.innerHTML = "";

    imageFiles.forEach((file, index)=>{

        const state = states[index];
        if(!state || !state.history || !state.history.length) return;

        const imgData = state.history[state.history.length - 1];

        // ===== 创建 canvas =====
        const temp = document.createElement("canvas");

        const MAX_THUMB = 120;
        const ratio = Math.min(
            MAX_THUMB / imgData.width,
            MAX_THUMB / imgData.height,
            1
        );

        temp.width = Math.floor(imgData.width * ratio);
        temp.height = Math.floor(imgData.height * ratio);

        const tctx = temp.getContext("2d");

        // ===== 核心：直接画（稳定版）=====
        const tempFull = document.createElement("canvas");
        tempFull.width = imgData.width;
        tempFull.height = imgData.height;
        tempFull.getContext("2d").putImageData(imgData, 0, 0);

        tctx.drawImage(tempFull, 0, 0, temp.width, temp.height);

        // ===== 创建 img =====
        const img = document.createElement("img");
        img.src = temp.toDataURL();
        img.className = "collage-image-item";

        // ===== 点击选中 =====
        img.onclick = ()=>{
            if(collageState.selectedIndexes.has(index)){
                collageState.selectedIndexes.delete(index);
                img.classList.remove("selected");
            }else{
                collageState.selectedIndexes.add(index);
                img.classList.add("selected");
            }
        };

        imageListEl.appendChild(img);
    });
}

/* ================== 加入拼图（核心） ================== */

addBtn.onclick = ()=>{
    if(collageState.selectedIndexes.size === 0){
        showMsg("请先点击缩略图选择图片", 800);
        return;
    }

    collageState.activeIndexes = Array.from(collageState.selectedIndexes);
    
    // 清空选中的高亮
    collageState.selectedIndexes.clear();
    document.querySelectorAll(".collage-image-item").forEach(img => {
        img.classList.remove("selected");
    });
    
    renderPreview();
    showMsg(`已加入 ${collageState.activeIndexes.length} 张图片到拼图`, 800);
};

/* ================== 布局切换 ================== */

layoutGroup.onclick = (e)=>{

/* ================== 间距 ================== */

spacingSlider.oninput = ()=>{

/* ================== 核心：拼图计算引擎 ================== */

function createCollageCanvas(){

    const imgs = collageState.activeIndexes.map(i=>{
        return states[i]?.history?.slice(-1)[0];
    }).filter(Boolean);

    if(!imgs.length) return null;

    const spacing = collageState.spacing;

    let canvas = document.createElement("canvas");
    let ctx = canvas.getContext("2d");

    if(collageState.layout === "horizontal"){
        let w = imgs.reduce((s,i)=>s+i.width,0) + spacing*(imgs.length-1);
        let h = Math.max(...imgs.map(i=>i.height));

        canvas.width = w;
        canvas.height = h;

        ctx.fillStyle = collageState.bgColor;
        ctx.fillRect(0,0,w,h);

        let x = 0;
        imgs.forEach(img=>{
            let temp = document.createElement("canvas");
            temp.width = img.width;
            temp.height = img.height;
            temp.getContext("2d").putImageData(img,0,0);

            ctx.drawImage(temp,x,0);
            x += img.width + spacing;
        });
    }

    else if(collageState.layout === "vertical"){
        let w = Math.max(...imgs.map(i=>i.width));
        let h = imgs.reduce((s,i)=>s+i.height,0) + spacing*(imgs.length-1);

        canvas.width = w;
        canvas.height = h;

        ctx.fillStyle = collageState.bgColor;
        ctx.fillRect(0,0,w,h);

        let y = 0;
        imgs.forEach(img=>{
            let temp = document.createElement("canvas");
            temp.width = img.width;
            temp.height = img.height;
            temp.getContext("2d").putImageData(img,0,0);

            ctx.drawImage(temp,0,y);
            y += img.height + spacing;
        });
    }

    else{
        // grid
        let n = parseInt(collageState.layout.replace("grid",""));
        let cols = n;
        let rows = Math.ceil(imgs.length / cols);

        let cellW = Math.max(...imgs.map(i=>i.width));
        let cellH = Math.max(...imgs.map(i=>i.height));

        let w = cols*cellW + spacing*(cols-1);
        let h = rows*cellH + spacing*(rows-1);

        canvas.width = w;
        canvas.height = h;

        ctx.fillStyle = collageState.bgColor;
        ctx.fillRect(0,0,w,h);

        imgs.forEach((img,i)=>{
            let r = Math.floor(i/cols);
            let c = i%cols;

            let x = c*(cellW+spacing);
            let y = r*(cellH+spacing);

            let temp = document.createElement("canvas");
            temp.width = img.width;
            temp.height = img.height;
            temp.getContext("2d").putImageData(img,0,0);

            ctx.drawImage(temp,x,y);
        });
    }

    return canvas;
}

/* ================== 预览（关键） ================== */

function renderPreview(){
    const canvasPreview = createCollageCanvas();
    if(!canvasPreview) return;

    // 覆盖到主canvas（只预览，不写入history）
    ctx.clearRect(0,0,canvas.width,canvas.height);

    const rect = viewerDiv.getBoundingClientRect();
    const scaleFit = Math.min(rect.width/canvasPreview.width, rect.height/canvasPreview.height);

    const drawW = canvasPreview.width * scaleFit;
    const drawH = canvasPreview.height * scaleFit;

    const x = (rect.width - drawW)/2;
    const y = (rect.height - drawH)/2;

    ctx.drawImage(canvasPreview,x,y,drawW,drawH);
}


applyBtn.onclick = ()=>{

    if (collageState.activeIndexes.length === 0) {

    finalCanvas.toBlob((blob)=>{

        );

        const imgData = tempCtx.getImageData(0, 0, finalCanvas.width, finalCanvas.height);

        imageFiles.push(file);
        states.push({
            original: cloneImageData(imgData),
            history: [cloneImageData(imgData)],
            redo: []
        });

        collageState.activeIndexes = [];
        collageState.selectedIndexes.clear();
        
        // ===== 刷新缩略图列表（显示新生成的图片）=====
        if (typeof buildImageList === 'function') {
            buildImageList();
        }

        panel.style.display = "none";
        
        if (currentTool === "collage") {

        showMsg("拼图已生成并添加", 1500);
